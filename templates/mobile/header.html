<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Berita Pohuwato • Terkini dari Gorontalo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-light: #f8f9fa;
      --text: #1a1a1a;
      --text-muted: #555;
      --accent: #0066cc;
      --accent-hover: #0055aa;
      --gradient: linear-gradient(135deg, #0066cc, #00aaff);
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-light);
      color: var(--text);
      line-height: 1.7;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 25px; }

    header {
      background: white;
      box-shadow: 0 2px 15px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 1.2rem 0;
      border-bottom: 1px solid #eee;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 2.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
      text-decoration: none;
    }
    .logo .line2::before { content: ' '; }

    nav ul {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      position: relative;
    }

    nav a:hover, nav a.active {
      color: var(--accent);
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 0;
      width: 0; height: 3px;
      background: var(--gradient);
      transition: width 0.4s;
    }

    nav a:hover::after { width: 100%; }

    /* Hero */
    .hero {
      padding: 7rem 0 5rem;
      background: white;
      text-align: center;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,102,204,0.04), transparent);
      pointer-events: none;
    }

    .hero-content {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
    }

    .hero-badge {
      display: inline-block;
      background: var(--gradient);
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: 4.2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      line-height: 1.1;
      color: #111;
    }

    .hero p {
      font-size: 1.35rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      background: var(--gradient);
      color: white;
      padding: 1rem 2.8rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.4s;
      box-shadow: 0 8px 25px rgba(0,102,204,0.25);
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,102,204,0.35);
    }

    /* Section */
    .section {
      padding: 5rem 0;
    }

    .section-title {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 3rem;
      text-align: center;
      color: #222;
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -12px; left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: var(--gradient);
      border-radius: 2px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 2.5rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.4s ease;
      border: 1px solid #eee;
    }

    .card:hover {
      transform: translateY(-15px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.12);
    }

    .card-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .card:hover .card-img {
      transform: scale(1.07);
    }

    .card-content {
      padding: 1.8rem;
    }

    .card-category {
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.8rem;
      display: block;
    }

    .card h3 {
      font-size: 1.65rem;
      margin-bottom: 1rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .card h3 a {
      color: inherit;
      text-decoration: none;
    }

    .meta {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 1rem;
    }

    footer {
      background: #f0f4f8;
      padding: 4rem 0 2rem;
      text-align: center;
      color: var(--text-muted);
      border-top: 1px solid #ddd;
    }
    footer p { margin: 0.5rem 0; font-size: 0.95rem; }

    /* Mobile: Hamburger & Nav Drawer */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      z-index: 1002;
    }
    .nav-toggle span {
      display: block;
      width: 22px;
      height: 2.5px;
      background: var(--accent);
      border-radius: 2px;
      transition: 0.3s;
    }
    .nav-toggle.active span:nth-child(1) {
      transform: translateY(7.5px) rotate(45deg);
    }
    .nav-toggle.active span:nth-child(2) { opacity: 0; }
    .nav-toggle.active span:nth-child(3) {
      transform: translateY(-7.5px) rotate(-45deg);
    }

    @media (max-width: 992px) {
      .hero h1 { font-size: 3.2rem; }
      nav ul { gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    }

    @media (max-width: 768px) {
      .container { padding: 0 16px; }

      header { padding: 1rem 0; }
      .logo { font-size: 1.5rem; line-height: 1.2; }
      .logo .line2 { display: block; font-size: 1.1rem; font-weight: 600; }
      .logo .line2::before { content: none; }

      .nav-toggle { display: flex; }
      nav {
        position: fixed;
        top: 0;
        right: 0;
        width: 280px;
        max-width: 85vw;
        height: 100vh;
        background: white;
        box-shadow: -4px 0 20px rgba(0,0,0,0.1);
        padding: 5rem 1.5rem 2rem 1.5rem;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 1001;
        overflow-y: auto;
      }
      nav.is-open { transform: translateX(0); }
      nav ul {
        flex-direction: column;
        gap: 0;
        align-items: stretch;
      }
      nav li {
        border-bottom: 1px solid #eee;
      }
      nav a {
        display: block;
        padding: 1rem 0;
        font-size: 1rem;
        color: var(--text);
      }
      nav a.active { color: var(--accent); font-weight: 600; }
      nav a::after { display: none; }
      .nav-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .nav-overlay.is-open {
        display: block;
        opacity: 1;
      }

      .hero { padding: 3rem 0 2.5rem; }
      .hero h1 { font-size: 1.65rem; line-height: 1.3; text-align: left; }
      .hero p { font-size: 0.95rem; text-align: left; margin-bottom: 1.5rem; }
      .hero-content { text-align: left; }
      .hero-badge { font-size: 0.75rem; padding: 0.4rem 1rem; margin-bottom: 1rem; }
      .btn { padding: 0.85rem 1.8rem; font-size: 0.95rem; }

      .section { padding: 2.5rem 0; }
      .section-title { font-size: 1.5rem; margin-bottom: 1.5rem; }
      .news-grid {
        grid-template-columns: 1fr;
        gap: 1.25rem;
        min-width: 0;
      }
      .card-img { height: 200px; }
      .card-content { padding: 1.25rem; }
      .card h3 { font-size: 1.15rem; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 1.5rem; }
      .card-img { height: 180px; }
      footer { padding: 2.5rem 0 1.5rem; }
      footer p { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="#" class="logo">Berita<span class="line2">Pohuwato</span></a>
    <button class="nav-toggle" type="button" aria-label="Buka menu" onclick="document.querySelector('.nav-overlay').classList.toggle('is-open'); document.querySelector('nav').classList.toggle('is-open'); this.classList.toggle('active'); document.body.style.overflow = document.querySelector('nav').classList.contains('is-open') ? 'hidden' : '';">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-overlay" onclick="this.classList.remove('is-open'); document.querySelector('nav').classList.remove('is-open'); document.querySelector('.nav-toggle').classList.remove('active'); document.body.style.overflow = '';"></div>
    <nav>
      <ul>
        <li><a href="#" class="active">Beranda</a></li>
        <li><a href="#">Marisa</a></li>
        <li><a href="#">Pohuwato</a></li>
        <li><a href="#">Wisata Pantai</a></li>
        <li><a href="#">Ekonomi & Tambang</a></li>
        <li><a href="#">Gorontalo</a></li>
      </ul>
    </nav>
  </div>
</header>
