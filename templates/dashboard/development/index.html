<!-- DevelopmentController — daftar semua package (grid kartu) -->
<div class="package-page">
  <h2 class="page-title-bar"><i class="fas fa-code-branch"></i> Semua Package</h2>
  <p class="page-subtitle">Ringkasan seluruh modul dari tabel <code>package</code>. Untuk mengubah data, buka <a href="{package_manage_url}">Kelola Package</a>.</p>

  {if package_count > 0}
  <div class="dev-package-grid">
    <!-- NEXA dev_package_row -->
    <a href="{module_url}" class="dev-package-card">
      <span class="dev-package-card-no">{no}</span>
      <div class="dev-package-card-icon" aria-hidden="true"><i class="{icon}"></i></div>
      <div class="dev-package-card-body">
        <span class="dev-package-card-title">{label}</span>
        <span class="dev-package-card-key"><code>{key}</code></span>
        <div class="dev-package-card-meta">
          <span class="pkg-dev-badge pkg-dev-{development}">{development_label}</span>
          <span class="dev-package-sort">Sort {sort_order}</span>
        </div>
      </div>
      <span class="dev-package-card-arrow" aria-hidden="true"><i class="fas fa-chevron-right"></i></span>
    </a>
    <!-- END dev_package_row -->
  </div>
  {else}
  <p class="dev-package-empty">Belum ada data package.</p>
  {endif}
</div>

<style>
.dev-package-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;padding:.25rem 0 1rem}
.dev-package-card{position:relative;display:flex;align-items:flex-start;gap:1rem;text-decoration:none;color:inherit;background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:1rem 1rem 1rem 1.1rem;transition:background .2s,border-color .2s,box-shadow .2s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.dev-package-card:hover{background:#f8faff;border-color:#c5d4f0;box-shadow:0 4px 14px rgba(13,71,161,.1)}
.dev-package-card:focus-visible{outline:2px solid #0d6efd;outline-offset:2px}
.dev-package-card-no{position:absolute;top:.5rem;right:.6rem;font-size:.72rem;font-weight:700;color:#9aa0a6;min-width:1.5rem;text-align:right}
.dev-package-card-icon{flex-shrink:0;width:2.75rem;height:2.75rem;border-radius:10px;background:linear-gradient(145deg,#e8f0fe,#f5f8ff);display:flex;align-items:center;justify-content:center;color:#0d47a1;font-size:1.35rem}
.dev-package-card-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:.35rem;padding-right:1.25rem}
.dev-package-card-title{font-weight:700;font-size:1.05rem;color:#202124;line-height:1.3}
.dev-package-card:hover .dev-package-card-title{color:#0d47a1}
.dev-package-card-key code{font-size:.8rem;background:#f1f3f4;padding:.15rem .4rem;border-radius:4px;color:#5f6368}
.dev-package-card-meta{display:flex;flex-wrap:wrap;align-items:center;gap:.5rem;margin-top:.25rem}
.dev-package-sort{font-size:.75rem;color:#80868b}
.dev-package-card-arrow{flex-shrink:0;align-self:center;color:#bdc1c6;font-size:.85rem;transition:color .2s,transform .2s}
.dev-package-card:hover .dev-package-card-arrow{color:#0d47a1;transform:translateX(3px)}
.pkg-dev-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.pkg-dev-1{background:#e7f1ff;color:#0d47a1}
.pkg-dev-2{background:#e8f5e9;color:#1b5e20}
.dev-package-empty{padding:1.25rem;color:#666}
</style>
