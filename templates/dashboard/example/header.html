<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Koperasi Merah Putih - Bersama Membangun Kesejahteraan</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
      color: #333;
      line-height: 1.6;
    }

    /* Header & Navbar */
    header {
      background: linear-gradient(135deg, #c8102e 0%, #b00020 100%);
      color: white;
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
    }

    .logo {
      font-size: 1.9rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo::before {
      content: "KMP";
      background: white;
      color: #c8102e;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      border: 3px solid #fff;
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
    }

    .nav-links a:hover {
      color: #ffd700;
      transform: translateY(-2px);
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(rgba(200, 16, 46, 0.75), rgba(0, 0, 139, 0.65)),
                  url('https://images.unsplash.com/photo-1552799446-159ba9523315?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      padding: 140px 20px 100px;
    }

    .hero h1 {
      font-size: 3.4rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
    }

    .hero p {
      font-size: 1.35rem;
      max-width: 780px;
      margin: 0 auto 2.5rem;
    }

    .btn {
      display: inline-block;
      background-color: #ffd700;
      color: #1a1a1a;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.25);
    }

    .btn:hover {
      background-color: #ffea80;
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid white;
      color: white;
      margin-left: 1.5rem;
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Section Umum */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    h2 {
      color: #c8102e;
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 2.4rem;
      position: relative;
    }

    h2::after {
      content: '';
      width: 80px;
      height: 4px;
      background: #ffd700;
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 2px;
    }

    /* Layanan */
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      transition: transform 0.3s, box-shadow 0.3s;
      text-align: center;
      padding: 2.5rem 1.5rem;
    }

    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 15px 35px rgba(200,16,46,0.18);
    }

    .card h3 {
      color: #c8102e;
      margin: 1.2rem 0 1rem;
      font-size: 1.5rem;
    }

    /* Footer */
    footer {
      background: #0d1b2a;
      color: white;
      padding: 60px 20px 30px;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #ccc;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #ffd700;
    }

    .copyright {
      margin-top: 2rem;
      opacity: 0.8;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 2.6rem; }
      .hero { padding: 100px 15px 80px; }
      .nav-links { gap: 1.2rem; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <div class="logo">Koperasi Merah Putih</div>
      <div class="nav-links">
        <a href="#beranda">Beranda</a>
        <a href="#tentang">Tentang</a>
        <a href="#layanan">Layanan</a>
        <a href="#kontak">Kontak</a>
      </div>
    </nav>
  </header>
