<section class="nx-doc-hero">
    <a href="{docs_url}" class="nx-doc-back">← Kembali ke Dokumentasi</a>
    <h1 class="nx-doc-title">{doc_title}</h1>
</section>

<div class="nx-doc-content">
    {doc_content}
</div>

<nav class="nx-doc-nav">
    {if prev_topic}
    <a href="{base_url}/docs/{prev_topic}" class="nx-doc-prev">← {prev_title}</a>
    {endif}
    <a href="{docs_url}" class="nx-doc-index">Daftar Topik</a>
    {if next_topic}
    <a href="{base_url}/docs/{next_topic}" class="nx-doc-next">{next_title} →</a>
    {endif}
</nav>
