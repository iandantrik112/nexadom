<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{if page_title}{page_title}{else}Welcome - {app_name}{endif}</title>

  <!-- Primary Meta Tags -->
  <meta name="title" content="{page_title|default:Welcome - Nexa Dom Framework}">
  <meta name="description" content="{page_description|default:Satu halaman untuk menyiapkan terminal — menyelaraskan database dan menghasilkan controller tanpa banyak tab dokumentasi.}">
  <meta name="keywords" content="{page_keywords|default:nexa nexa-dom framework php cli migrate make controller database}">
  <meta name="author" content="{app_name}">
  <meta name="robots" content="index, follow">
  <meta name="language" content="Indonesian">
  <meta name="revisit-after" content="7 days">
  <link rel="canonical" href="{canonical_url}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{og_type|default:website}">
  <meta property="og:url" content="{og_url}">
  <meta property="og:title" content="{og_title|default:Nexa Dom Framework}">
  <meta property="og:description" content="{og_description|default:Satu halaman untuk menyiapkan terminal — menyelaraskan database dan menghasilkan controller tanpa banyak tab dokumentasi.}">
  <meta property="og:image" content="{og_image}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="{app_name}">
  <meta property="og:locale" content="id_ID">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="{twitter_url}">
  <meta name="twitter:title" content="{twitter_title|default:Nexa Dom Framework}">
  <meta name="twitter:description" content="{twitter_description|default:Satu halaman untuk menyiapkan terminal — menyelaraskan database dan menghasilkan controller tanpa banyak tab dokumentasi.}">
  <meta name="twitter:image" content="{twitter_image}">

  <!-- Additional -->
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="{app_name}">

  <!-- Schema.org (microdata helpers) -->
  <meta itemprop="name" content="{page_title|default:Welcome - Nexa Dom Framework}">
  <meta itemprop="description" content="{page_description|default:Satu halaman untuk menyiapkan terminal — menyelaraskan database dan menghasilkan controller tanpa banyak tab dokumentasi.}">
  <meta itemprop="image" content="{schema_image}">
  <link href="/assets/css/style.css" rel="stylesheet" />
  <link rel="icon" href="{assets/images/logo.png}">
</head>
